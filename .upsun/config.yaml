applications:
  app:
    source:
      root: "/"
    type: "nodejs:22"
    mounts:
      "plugins":
        source: storage
        source_path: plugins
    web:
      commands:
        start: "node build/server/index.js"
      locations:
        "/":
          root: "dist"
          passthru: true
    hooks:
      build: |
        set -e
        npm ci
        npm run build
      deploy: |
        set -e
        mkdir -p plugins
        cp manifest.json plugins/manifest.json
        ROUTE=$(node -e 'const routes=JSON.parse(process.env.PLATFORM_ROUTES||"{}");const first=Object.keys(routes)[0]||"http://localhost:3000";process.stdout.write(first.replace(/\/$/,""));')
        node -e 'const fs=require("fs");const p="plugins/manifest.json";const r=process.argv[1];const next=fs.readFileSync(p,"utf8").replace(/http:\/\/localhost:3000/g,r);fs.writeFileSync(p,next);' "$ROUTE"
